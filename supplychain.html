<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhantomFeed — Supply Chain Risk</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0d;--bg2:#0c0f14;--bg3:#111620;--bg4:#161c28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#c9d4e3;--muted:#4e5d72;
  --teal:#00d4aa;--teal-d:rgba(0,212,170,0.08);
  --red:#f0595a;--amber:#e8a530;--green:#3dd68c;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2836}
.shell{display:grid;grid-template-rows:44px 1fr 28px;height:100vh}
.topbar{display:flex;align-items:center;gap:14px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.logo-text{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--teal)}
.logo-pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.page-title{font-size:9px;letter-spacing:2px;color:var(--muted);border-left:1px solid var(--border);padding-left:14px}
.topnav{display:flex;gap:4px;margin-left:auto}
.tnav{font-family:var(--mono);font-size:8px;letter-spacing:1px;padding:4px 10px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:all .15s}
.tnav:hover,.tnav.active{border-color:var(--teal);color:var(--teal);background:var(--teal-d)}
.statusbar{background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:16px;font-size:8px;color:var(--muted);letter-spacing:.5px}
.layout{display:grid;grid-template-columns:280px 1fr;height:100%;overflow:hidden}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-body{flex:1;overflow-y:auto;padding:12px}
.main{position:relative;overflow:hidden;display:flex;flex-direction:column}
.btn{font-family:var(--mono);font-size:9px;letter-spacing:.5px;padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.btn:hover,.btn.primary{border-color:var(--teal);color:var(--teal);background:var(--teal-d)}
.btn.sm{padding:3px 8px;font-size:8px}
.btn.danger{border-color:rgba(240,89,90,.4);color:var(--red);background:var(--red-d)}
input,select{font-family:var(--mono);font-size:9px;background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:5px 8px;outline:none;width:100%;margin-bottom:6px}
input:focus,select:focus{border-color:var(--teal)}
label{font-size:8px;color:var(--muted);display:block;margin-bottom:2px;letter-spacing:.5px}
.section-header{font-size:9px;letter-spacing:2px;color:var(--teal);text-transform:uppercase;margin-bottom:10px;margin-top:16px;display:flex;align-items:center;gap:8px}
.section-header::after{content:'';flex:1;height:1px;background:var(--border)}
.section-header:first-child{margin-top:0}
.vendor-item{border:1px solid var(--border);padding:8px 10px;margin-bottom:6px;transition:border-color .15s;cursor:pointer}
.vendor-item:hover{border-color:var(--teal)}
.vendor-name{font-size:10px;font-weight:600;margin-bottom:3px}
.vendor-meta{font-size:8px;color:var(--muted)}
.risk-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.risk-high{background:var(--red)}
.risk-medium{background:var(--amber)}
.risk-low{background:var(--green)}
.risk-unknown{background:var(--muted)}
/* Graph canvas */
#graph-canvas{width:100%;height:100%;display:block}
.node-tooltip{position:absolute;background:var(--bg3);border:1px solid var(--border2);padding:10px 12px;font-size:9px;pointer-events:none;display:none;z-index:100;min-width:160px;max-width:240px}
.tooltip-title{font-weight:700;color:var(--teal);margin-bottom:4px}
.tooltip-row{display:flex;justify-content:space-between;gap:16px;color:var(--muted);margin-top:2px}
.graph-controls{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:6px}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.stat-card{background:var(--bg3);border:1px solid var(--border);padding:8px 10px;text-align:center}
.stat-val{font-size:18px;font-weight:700;color:var(--teal)}
.stat-label{font-size:7px;color:var(--muted);letter-spacing:1px}
.client-select{font-family:var(--mono);font-size:9px;background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:5px 8px;outline:none;width:100%;margin-bottom:10px}
.slabel{font-size:8px;letter-spacing:2px;color:var(--muted);padding:10px 12px 4px;text-transform:uppercase}
.toast-container{position:fixed;bottom:40px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:9px 14px;background:var(--bg3);border:1px solid var(--border);font-size:9px;color:var(--text);display:flex;align-items:center;gap:10px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-color:rgba(61,214,140,.4)}.toast.error{border-color:rgba(240,89,90,.4)}
</style>
</head>
<body data-page-title="SUPPLY CHAIN" data-back-url="/index.html">
<div class="shell">
<div class="topbar"></div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="slabel">Client</div>
    <div style="padding:0 12px 6px">
      <select class="client-select" id="clientSelect" onchange="onClientChange()">
        <option value="">Select client...</option>
      </select>
    </div>
    <div class="sidebar-body">
      <div class="stat-row" id="stats" style="display:none">
        <div class="stat-card"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Vendors</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--red)" id="statHigh">0</div><div class="stat-label">High Risk</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--amber)" id="statMed">0</div><div class="stat-label">Medium</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--green)" id="statLow">0</div><div class="stat-label">Low Risk</div></div>
      </div>

      <div class="section-header">Add Vendor</div>
      <div id="vendor-form">
        <label>Vendor Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Microsoft, AWS, Crowdstrike">
        <label>Type</label>
        <select id="f-type">
          <option value="software">Software</option>
          <option value="cloud">Cloud / SaaS</option>
          <option value="hardware">Hardware</option>
          <option value="service">Managed Service</option>
          <option value="other">Other</option>
        </select>
        <label>Criticality</label>
        <select id="f-crit">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
        <label>Products (comma-separated)</label>
        <input type="text" id="f-products" placeholder="e.g. Windows, Exchange, Azure AD">
        <label>Category</label>
        <input type="text" id="f-category" placeholder="e.g. Identity, Endpoint, Network">
        <button class="btn primary" style="width:100%;margin-top:4px" onclick="addVendor()">+ Add Vendor</button>
      </div>

      <div class="section-header" style="margin-top:16px">Vendor List</div>
      <div id="vendor-list"></div>

      <div style="margin-top:12px;display:flex;gap:6px">
        <button class="btn sm" style="flex:1" onclick="scanVendors()">Run Risk Scan</button>
        <button class="btn sm" style="flex:1" onclick="loadGraph()">Refresh Graph</button>
      </div>
    </div>
  </div>

  <!-- Graph panel -->
  <div class="main">
    <svg id="graph-canvas"></svg>
    <div class="node-tooltip" id="tooltip">
      <div class="tooltip-title" id="tt-title"></div>
      <div id="tt-body"></div>
    </div>
    <div class="graph-controls">
      <button class="btn sm" onclick="resetZoom()">Reset View</button>
    </div>
    <div id="graph-empty" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--muted);font-size:11px">
      Select a client and add vendors to visualize supply chain risk
    </div>
  </div>
</div>

<div class="statusbar">
  <div style="width:4px;height:4px;border-radius:50%;background:var(--muted)" id="sb-dot"></div>
  <span id="sb-status">READY</span>
  <span style="margin-left:auto">D3.js FORCE-DIRECTED GRAPH</span>
</div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const API = '/api/v1';
let clientId = null;
let simulation = null;
let svg = null, g = null, zoom = null;
const params = new URLSearchParams(location.search);

function toast(msg, type='info', dur=3000) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<span>${msg}</span><span style="margin-left:auto;cursor:pointer" onclick="this.parentElement.remove()">✕</span>`;
  document.getElementById('toast-container').appendChild(t);
  if (dur) setTimeout(()=>t.remove(), dur);
}

function getToken() { return localStorage.getItem('token') || localStorage.getItem('pf_token') || ''; }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function api(path, opts={}) {
  try {
    const r = await fetch(API + path, {
      ...opts,
      headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', ...(opts.headers||{}) }
    });
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

async function loadClients() {
  const r = await api('/admin/clients');
  const sel = document.getElementById('clientSelect');
  if (!r || !r.length) { sel.innerHTML = '<option value="">No clients</option>'; return; }
  sel.innerHTML = '<option value="">Select client...</option>' + r.map(c =>
    `<option value="${c.id}"${params.get('client_id')===c.id?' selected':''}>${esc(c.name)}</option>`
  ).join('');
  if (params.get('client_id')) {
    clientId = params.get('client_id');
    await loadVendors();
    await loadGraph();
  }
}

function onClientChange() {
  clientId = document.getElementById('clientSelect').value;
  if (!clientId) return;
  loadVendors();
  loadGraph();
}

async function loadVendors() {
  if (!clientId) return;
  const resp = await api(`/clients/${clientId}/vendors`);
  const vendors = resp ? resp.vendors : [];
  renderVendorList(vendors);
  updateStats(resp || {});
}

function updateStats(resp) {
  const stats = resp.stats || {};
  const vendors = resp.vendors || [];
  document.getElementById('stats').style.display = 'grid';
  document.getElementById('statTotal').textContent = vendors.length;
  document.getElementById('statHigh').textContent = vendors.filter(v => v.threat_level === 'high').length;
  document.getElementById('statMed').textContent = vendors.filter(v => v.threat_level === 'medium').length;
  document.getElementById('statLow').textContent = vendors.filter(v => v.threat_level === 'low').length;
}

function renderVendorList(vendors) {
  const el = document.getElementById('vendor-list');
  if (!vendors.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:9px;text-align:center;padding:12px">No vendors added yet</div>';
    return;
  }
  const riskClass = {high:'risk-high', medium:'risk-medium', low:'risk-low', unknown:'risk-unknown'};
  el.innerHTML = vendors.map(v => `
    <div class="vendor-item" onclick="focusVendor('${v.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="vendor-name">
          <span class="risk-dot ${riskClass[v.threat_level||'unknown']}"></span>
          ${esc(v.vendor_name)}
        </div>
        <button class="btn sm danger" onclick="event.stopPropagation();deleteVendor('${v.id}')">✕</button>
      </div>
      <div class="vendor-meta">
        ${esc(v.vendor_type||'')} · ${esc(v.criticality||'')} criticality
        ${v.risk_data && v.risk_data.item_count ? ` · ${v.risk_data.item_count} threat items` : ''}
      </div>
    </div>
  `).join('');
}

async function addVendor() {
  if (!clientId) { toast('Select a client first', 'error'); return; }
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Vendor name is required', 'error'); return; }
  const products = document.getElementById('f-products').value.split(',').map(s=>s.trim()).filter(Boolean);
  const body = {
    vendor_name: name,
    vendor_type: document.getElementById('f-type').value,
    criticality: document.getElementById('f-crit').value,
    products: products,
    category: document.getElementById('f-category').value.trim(),
  };
  const r = await api(`/clients/${clientId}/vendors`, {method:'POST', body:JSON.stringify(body)});
  if (r && r.id) {
    toast(`Added: ${name}`, 'success');
    document.getElementById('f-name').value = '';
    document.getElementById('f-products').value = '';
    document.getElementById('f-category').value = '';
    await loadVendors();
    await loadGraph();
  } else {
    toast('Failed to add vendor', 'error');
  }
}

async function deleteVendor(vid) {
  if (!confirm('Delete this vendor?')) return;
  const r = await api(`/clients/${clientId}/vendors/${vid}`, {method:'DELETE'});
  if (r) {
    toast('Vendor deleted', 'success');
    await loadVendors();
    await loadGraph();
  }
}

async function scanVendors() {
  if (!clientId) return;
  const btn = document.querySelector('[onclick="scanVendors()"]');
  if (btn) { btn.textContent = '⟳ Scanning...'; btn.disabled = true; }
  document.getElementById('sb-dot').style.background = 'var(--amber)';
  document.getElementById('sb-status').textContent = 'SCANNING VENDORS...';
  toast('Risk scan started — checking threat intelligence feeds', 'info', 4000);
  const r = await api(`/clients/${clientId}/vendors/scan`, {method:'POST'});
  if (r) {
    let elapsed = 0;
    const poll = setInterval(async () => {
      elapsed += 2;
      document.getElementById('sb-status').textContent = `SCANNING... ${elapsed}s`;
      if (elapsed >= 8) {
        clearInterval(poll);
        await loadVendors();
        await loadGraph();
        if (btn) { btn.textContent = 'Run Risk Scan'; btn.disabled = false; }
        document.getElementById('sb-dot').style.background = 'var(--green)';
        document.getElementById('sb-status').textContent = 'SCAN COMPLETE';
        toast('Risk scan complete — vendor threat levels updated', 'success');
        setTimeout(() => { document.getElementById('sb-status').textContent = 'READY'; }, 5000);
      }
    }, 2000);
  } else {
    if (btn) { btn.textContent = 'Run Risk Scan'; btn.disabled = false; }
    document.getElementById('sb-dot').style.background = 'var(--muted)';
    document.getElementById('sb-status').textContent = 'SCAN FAILED';
    toast('Scan request failed', 'error');
  }
}

function focusVendor(vid) {
  if (!svg) return;
  // Highlight by dimming others
  svg.selectAll('.vendor-node').attr('opacity', d => d.id === vid ? 1 : 0.3);
  svg.selectAll('.vendor-link').attr('opacity', d => (d.target.id === vid || d.source.id === vid) ? 1 : 0.15);
  setTimeout(() => {
    svg.selectAll('.vendor-node').attr('opacity', 1);
    svg.selectAll('.vendor-link').attr('opacity', 0.6);
  }, 2500);
}

function resetZoom() {
  if (!svg || !zoom) return;
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
}

async function loadGraph() {
  if (!clientId) return;
  document.getElementById('graph-empty').style.display = 'none';
  const data = await api(`/clients/${clientId}/supply-chain-graph`);
  if (!data || !data.nodes || data.nodes.length <= 1) {
    document.getElementById('graph-empty').style.display = 'block';
    document.getElementById('graph-empty').textContent = 'No vendors added yet — use the form to add vendors';
    return;
  }
  renderGraph(data);
  document.getElementById('sb-dot').style.background = 'var(--green)';
  document.getElementById('sb-status').textContent = `LOADED — ${data.nodes.length} nodes · ${data.links.length} links`;
}

function renderGraph(data) {
  const canvas = document.getElementById('graph-canvas');
  const W = canvas.clientWidth || 800;
  const H = canvas.clientHeight || 600;

  d3.select('#graph-canvas').selectAll('*').remove();

  svg = d3.select('#graph-canvas')
    .attr('width', W).attr('height', H);

  zoom = d3.zoom()
    .scaleExtent([0.3, 3])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  g = svg.append('g');

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id', 'arrow').attr('viewBox', '0 -5 10 10')
    .attr('refX', 18).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#2a3f5f');

  // Simulation
  simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(d => d.id).distance(d => d.target.type === 'product' ? 80 : 160))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(30));

  // Links
  const link = g.append('g').attr('class', 'links')
    .selectAll('line')
    .data(data.links)
    .join('line')
    .attr('class', 'vendor-link')
    .attr('stroke', d => d.color || '#2a2f3e')
    .attr('stroke-width', d => d.width || 1)
    .attr('stroke-opacity', 0.6)
    .attr('marker-end', 'url(#arrow)');

  // Node groups
  const node = g.append('g').attr('class', 'nodes')
    .selectAll('g')
    .data(data.nodes)
    .join('g')
    .attr('class', 'vendor-node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  // Node circles
  node.append('circle')
    .attr('r', d => d.type === 'client' ? 18 : d.type === 'product' ? 8 : 14)
    .attr('fill', d => d.type === 'client' ? '#00d4aa22' : d.color + '22' || '#2a2f3e')
    .attr('stroke', d => d.type === 'client' ? '#00d4aa' : d.color || '#4e5d72')
    .attr('stroke-width', d => d.type === 'client' ? 2 : 1.5);

  // Node labels
  node.append('text')
    .attr('dy', d => d.type === 'product' ? 16 : 22)
    .attr('text-anchor', 'middle')
    .attr('fill', '#c9d4e3')
    .attr('font-family', 'JetBrains Mono, monospace')
    .attr('font-size', d => d.type === 'product' ? 7 : 8)
    .text(d => d.label.length > 16 ? d.label.slice(0, 14) + '…' : d.label);

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  node.on('mouseover', (e, d) => {
    document.getElementById('tt-title').textContent = d.label;
    let body = '';
    if (d.type !== 'client' && d.type !== 'product') {
      body += `<div class="tooltip-row"><span>Risk</span><span style="color:${d.color}">${(d.risk||'unknown').toUpperCase()}</span></div>`;
      body += `<div class="tooltip-row"><span>Threat items</span><span>${d.item_count||0}</span></div>`;
      if (d.cve_count) body += `<div class="tooltip-row"><span>CVEs</span><span>${d.cve_count}</span></div>`;
      if (d.critical_count) body += `<div class="tooltip-row"><span>Critical</span><span style="color:var(--red)">${d.critical_count}</span></div>`;
    }
    document.getElementById('tt-body').innerHTML = body;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.pageX + 12) + 'px';
    tooltip.style.top = (e.pageY - 20) + 'px';
  }).on('mousemove', e => {
    tooltip.style.left = (e.pageX + 12) + 'px';
    tooltip.style.top = (e.pageY - 20) + 'px';
  }).on('mouseout', () => tooltip.style.display = 'none');

  // Tick
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

loadClients();
</script>
<script src="/nav-component.js"></script>
</body>
</html>
