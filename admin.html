<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhantomFeed — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0d;--bg2:#0c0f14;--bg3:#111620;--bg4:#161c28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#c9d4e3;--muted:#4e5d72;
  --teal:#00d4aa;--teal-d:rgba(0,212,170,0.08);--teal-m:rgba(0,212,170,0.15);
  --red:#f0595a;--red-d:rgba(240,89,90,0.1);
  --amber:#e8a530;--blue:#4d9de0;--green:#3dd68c;--purple:#9b8ef5;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2836}
.shell{display:grid;grid-template-rows:44px 1fr 28px;height:100vh}
.topbar{display:flex;align-items:center;gap:14px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.logo-text{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--teal)}
.logo-pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.page-title{font-size:9px;letter-spacing:2px;color:var(--muted);border-left:1px solid var(--border);padding-left:14px}
.topnav{display:flex;gap:4px;margin-left:auto}
.tnav{font-family:var(--mono);font-size:8px;letter-spacing:1px;padding:4px 10px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:all .15s}
.tnav:hover,.tnav.active{border-color:var(--teal);color:var(--teal);background:var(--teal-d)}
.statusbar{background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:16px;font-size:8px;color:var(--muted);letter-spacing:.5px}
.sb-dot{width:4px;height:4px;border-radius:50%;background:var(--muted)}
.layout{display:grid;grid-template-columns:220px 1fr;height:100%;overflow:hidden}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.main{overflow-y:auto;padding:20px}
.slabel{font-size:8px;letter-spacing:2px;color:var(--muted);padding:12px 12px 4px;text-transform:uppercase}
.cl-item{padding:8px 12px;cursor:pointer;font-size:10px;color:var(--muted);border-left:2px solid transparent;transition:all .12s}
.cl-item:hover{color:var(--text);background:rgba(255,255,255,.02)}
.cl-item.active{color:var(--text);background:var(--teal-d);border-left-color:var(--teal)}
.cl-name{font-weight:600;color:var(--text)}
.cl-email{font-size:8px;color:var(--muted)}
.section-header{font-size:10px;letter-spacing:2px;color:var(--teal);text-transform:uppercase;margin-bottom:16px;margin-top:20px;display:flex;align-items:center;gap:8px}
.section-header::after{content:'';flex:1;height:1px;background:var(--border)}
.section-header:first-child{margin-top:0}
.btn{font-family:var(--mono);font-size:9px;letter-spacing:.5px;padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.btn:hover,.btn.primary{border-color:var(--teal);color:var(--teal);background:var(--teal-d)}
.btn.danger{border-color:var(--red);color:var(--red);background:var(--red-d)}
.btn.sm{padding:3px 8px;font-size:8px}
table{width:100%;border-collapse:collapse;font-size:9px}
th{padding:7px 10px;background:var(--bg4);color:var(--muted);font-weight:500;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{font-size:7px;letter-spacing:.5px;padding:2px 6px;border:1px solid}
.badge.ok{border-color:rgba(61,214,140,.4);color:var(--green)}
.badge.warn{border-color:rgba(232,165,48,.4);color:var(--amber)}
.badge.err{border-color:rgba(240,89,90,.4);color:var(--red)}
.badge.muted{border-color:var(--border);color:var(--muted)}
.dropzone{border:1px dashed var(--border2);padding:16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.dropzone:hover,.dropzone.drag-over{border-color:var(--teal);background:var(--teal-d)}
.dz-text{font-size:9px;color:var(--muted)}
.dz-text span{color:var(--teal)}
input[type=file]{display:none}
.finput{font-family:var(--mono);font-size:9px;background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:5px 8px;outline:none;width:100%}
.finput:focus{border-color:var(--teal)}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;padding:7px 14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-pane{display:none}
.tab-pane.active{display:block}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--border);padding:12px}
.stat-val{font-size:22px;font-weight:700;color:var(--teal)}
.stat-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:9px}
.toast-container{position:fixed;bottom:40px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:9px 14px;background:var(--bg3);border:1px solid var(--border);font-size:9px;color:var(--text);display:flex;align-items:center;gap:10px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-color:rgba(61,214,140,.4)}
.toast.error{border-color:rgba(240,89,90,.4)}
.spinner{display:inline-block;width:10px;height:10px;border:1px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body data-page-title="ADMIN" data-back-url="/index.html">
<div class="shell">
<div class="topbar"></div>

<div class="layout">
  <!-- Client sidebar -->
  <div class="sidebar">
    <div class="slabel">Clients</div>
    <div style="padding:4px 8px;background:var(--bg2);border-bottom:1px solid var(--border)">
      <input type="text" id="client-search" placeholder="Search clients..." oninput="filterClientList()" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:9px;padding:5px 8px;outline:none">
    </div>
    <div id="client-list"></div>
    <div style="padding:10px 12px;border-top:1px solid var(--border);margin-top:8px;display:flex;flex-direction:column;gap:6px">
      <button class="btn sm" style="width:100%" onclick="showNewClientForm()">+ New Client</button>
      <button class="btn sm" style="width:100%" onclick="showGlobalAuditView()">&#9776; Global Audit Log</button>
      <button class="btn sm" style="width:100%" onclick="exportGlobalAudit()">&#8595; Global Audit CSV</button>
    </div>
  </div>

  <!-- Main panel -->
  <div class="main" id="main-panel">
    <div class="empty">← Select a client to manage assets, uploads, and exports</div>
  </div>
</div>

<div class="statusbar">
  <div class="sb-dot" id="sb-dot"></div>
  <span id="sb-status">LOADING...</span>
  <span style="margin-left:auto" id="sb-time"></span>
</div>
</div>

<div class="toast-container" id="toast-container"></div>

<!-- Edit Client Modal -->
<div id="edit-client-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:4px;width:400px;max-width:95vw;padding:24px">
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--teal);margin-bottom:16px">EDIT CLIENT</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <div style="font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:4px">CLIENT NAME *</div>
        <input id="ec-name" type="text" class="finput" placeholder="Acme Corporation">
      </div>
      <div>
        <div style="font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:4px">CONTACT EMAIL</div>
        <input id="ec-email" type="email" class="finput" placeholder="security@acme.com">
      </div>
      <div>
        <div style="font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:4px">INDUSTRY</div>
        <select id="ec-industry" class="finput" style="cursor:pointer">
          <option value="">Select industry...</option>
          <option value="Financial Services">Financial Services</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Defense">Defense / Government</option>
          <option value="Technology">Technology</option>
          <option value="Manufacturing">Manufacturing</option>
          <option value="Energy">Energy / Utilities</option>
          <option value="Retail">Retail / E-Commerce</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn sm" onclick="closeEditModal()">Cancel</button>
      <button class="btn sm primary" id="ec-submit-btn" onclick="submitEditClient()">Save Changes</button>
    </div>
  </div>
</div>

<!-- New Client Modal -->
<div id="new-client-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:4px;width:400px;max-width:95vw;padding:24px">
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--teal);margin-bottom:16px">NEW CLIENT</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <div style="font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:4px">CLIENT NAME *</div>
        <input id="nc-name" type="text" class="finput" placeholder="Acme Corporation">
      </div>
      <div>
        <div style="font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:4px">CONTACT EMAIL</div>
        <input id="nc-email" type="email" class="finput" placeholder="security@acme.com">
      </div>
      <div>
        <div style="font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:4px">INDUSTRY</div>
        <select id="nc-industry" class="finput" style="cursor:pointer">
          <option value="">Select industry...</option>
          <option value="Financial Services">Financial Services</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Defense">Defense / Government</option>
          <option value="Technology">Technology</option>
          <option value="Manufacturing">Manufacturing</option>
          <option value="Energy">Energy / Utilities</option>
          <option value="Retail">Retail / E-Commerce</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn sm" onclick="closeNewClientModal()">Cancel</button>
      <button class="btn sm primary" id="nc-submit-btn" onclick="submitNewClient()">Create Client</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
let clients = [];
let selectedClient = null;

function toast(msg, type='info', dur=3000) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<span>${msg}</span><span style="margin-left:auto;cursor:pointer" onclick="this.parentElement.remove()">✕</span>`;
  document.getElementById('toast-container').appendChild(t);
  if (dur) setTimeout(()=>t.remove(), dur);
}

function getToken() { return localStorage.getItem('token')||localStorage.getItem('pf_token')||''; }

function exportGlobalAudit() {
  const a = document.createElement('a');
  a.href = `${API}/audit/export.csv?token=${encodeURIComponent(getToken())}`;
  a.download = 'audit-global.csv';
  a.click();
}

async function loadClients() {
  try {
    const r = await fetch(API+'/admin/clients', {headers:{'Authorization':'Bearer '+getToken()}});
    if (!r.ok) { document.getElementById('sb-status').textContent='AUTH REQUIRED'; return; }
    const raw = await r.json(); clients = Array.isArray(raw) ? raw : (raw.clients || []);
    renderClientList();
    document.getElementById('sb-dot').style.background='var(--green)';
    document.getElementById('sb-status').textContent='● CONNECTED — '+clients.length+' clients';
    document.getElementById('sb-time').textContent=new Date().toISOString().slice(0,16).replace('T',' ')+' UTC';
  } catch(e) {
    document.getElementById('sb-status').textContent='○ OFFLINE';
  }
}

function renderClientList(filtered) {
  const el = document.getElementById('client-list');
  const list = filtered || clients;
  if (!clients.length) { el.innerHTML='<div class="empty">No clients yet</div>'; return; }
  if (!list.length) { el.innerHTML='<div class="empty">No clients match</div>'; return; }
  el.innerHTML = list.map(c => `
    <div class="cl-item${selectedClient&&selectedClient.id===c.id?' active':''}" onclick="selectClient('${c.id}')">
      <div class="cl-name">${esc(c.name)}</div>
      <div class="cl-email">${esc(c.contact_email||'')}</div>
    </div>
  `).join('');
}

function filterClientList() {
  const q = (document.getElementById('client-search')?.value || '').toLowerCase();
  if (!q) { renderClientList(); return; }
  renderClientList(clients.filter(c =>
    c.name.toLowerCase().includes(q) ||
    (c.contact_email || '').toLowerCase().includes(q) ||
    (c.industry || '').toLowerCase().includes(q)
  ));
}

function selectClient(id) {
  selectedClient = clients.find(c=>c.id===id);
  renderClientList();
  renderClientPanel();
}

function renderClientPanel() {
  if (!selectedClient) return;
  const c = selectedClient;
  document.getElementById('main-panel').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--text)">${esc(c.name)}</div>
        <div style="font-size:9px;color:var(--muted)">${esc(c.contact_email||'')} &nbsp;·&nbsp; ID: ${c.id.slice(0,8)}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn sm" onclick="showEditClient()">✎ Edit</button>
        <button class="btn sm" onclick="window.open('/upload.html','_self')">⬆ Upload Scan</button>
        <button class="btn sm danger" onclick="deleteClient('${c.id}')">✕ Delete</button>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab active" onclick="cTab('assets')">Assets</button>
      <button class="tab" onclick="cTab('history')">Import History</button>
      <button class="tab" onclick="cTab('export')">Export</button>
      <button class="tab" onclick="cTab('users')">Users</button>
      <button class="tab" onclick="cTab('scanners')">Scanners</button>
      <button class="tab" onclick="cTab('siems')">SIEMs</button>
      <button class="tab" onclick="cTab('audit')">Audit Log</button>
      <button class="tab" onclick="cTab('webhooks')">Webhooks</button>
    </div>

    <div id="cpane-assets" class="tab-pane active"></div>
    <div id="cpane-history" class="tab-pane"></div>
    <div id="cpane-export" class="tab-pane"></div>
    <div id="cpane-users" class="tab-pane"></div>
    <div id="cpane-scanners" class="tab-pane"></div>
    <div id="cpane-siems" class="tab-pane"></div>
    <div id="cpane-audit" class="tab-pane"></div>
    <div id="cpane-webhooks" class="tab-pane"></div>
  `;
  loadAssetsTab();
}

function cTab(name) {
  const tabs = ['assets','history','export','users','scanners','siems','audit','webhooks'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', tabs[i]===name));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('cpane-'+name).classList.add('active');
  if (name==='assets') loadAssetsTab();
  else if (name==='history') loadHistoryTab();
  else if (name==='export') renderExportTab();
  else if (name==='users') loadUsersTab();
  else if (name==='scanners') loadScannersTab();
  else if (name==='siems') loadSIEMsTab();
  else if (name==='audit') loadAuditTab();
  else if (name==='webhooks') loadWebhooksTab();
}

// ── Assets tab ─────────────────────────────────────────────────────────────────
async function loadAssetsTab() {
  const el = document.getElementById('cpane-assets');
  if (!el) return;
  el.innerHTML = '<span class="spinner"></span>';
  try {
    const r = await fetch(`${API}/admin/clients/${selectedClient.id}/assets`, {headers:{'Authorization':'Bearer '+getToken()}});
    const assets = r.ok ? await r.json() : [];

    el.innerHTML = `
      <div class="section-header">Asset Inventory</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div class="dropzone" style="flex:1;padding:12px" id="dz-asset"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="assetDrop(event)">
          <div class="dz-text">Drag CSV/XLSX or <span onclick="document.getElementById('fi-asset').click()">browse</span></div>
          <input type="file" id="fi-asset" accept=".csv,.xlsx" onchange="uploadAssets(this)">
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="btn sm" onclick="downloadAssetTemplate()">⬇ Template</button>
          <button class="btn sm" onclick="exportAssets()">⬇ Export CSV</button>
          <button class="btn sm" onclick="runMatching()">▶ Run Matching</button>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-val">${assets.length}</div><div class="stat-label">Total Assets</div></div>
        <div class="stat-card"><div class="stat-val" id="match-count">—</div><div class="stat-label">CPE Matches</div></div>
      </div>
      <table>
        <thead><tr><th>Hostname</th><th>IP</th><th>OS</th><th>Software</th><th>Version</th><th>Type</th><th></th></tr></thead>
        <tbody>
          ${assets.length ? assets.map(a=>`
            <tr>
              <td>${esc(a.hostname||'')}</td>
              <td>${esc(a.ip_address||'')}</td>
              <td>${esc(a.os||'')}</td>
              <td>${esc(a.software||'')}</td>
              <td>${esc(a.version||'')}</td>
              <td>${esc(a.asset_type||'')}</td>
              <td><button class="btn sm danger" onclick="deleteAsset('${a.id}')">✕</button></td>
            </tr>
          `).join('') : '<tr><td colspan="7" class="empty">No assets imported yet</td></tr>'}
        </tbody>
      </table>
    `;
  } catch(e) { el.innerHTML = '<div class="empty">Error loading assets</div>'; }
}

function assetDrop(e) {
  e.preventDefault();
  document.getElementById('dz-asset').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) doUploadAssets(file);
}

function uploadAssets(input) {
  const file = input.files[0];
  if (file) doUploadAssets(file);
}

async function doUploadAssets(file) {
  const fd = new FormData();
  fd.append('file', file);
  toast('Uploading assets...', 'info', 0);
  try {
    const r = await fetch(`${API}/upload/assets?client_id=${selectedClient.id}`, {method:'POST', headers:{'Authorization':'Bearer '+getToken()}, body:fd});
    document.querySelector('.toast').remove();
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail);
    const uploadId = data.upload_id;
    // Auto-confirm
    const r2 = await fetch(`${API}/upload/assets/${uploadId}/confirm`, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()}, body:'{}'});
    const d2 = await r2.json();
    toast(`Imported ${d2.imported_assets} assets`, 'success');
    loadAssetsTab();
  } catch(e) { toast('Error: '+e.message, 'error'); }
}

async function deleteAsset(assetId) {
  if (!confirm('Delete this asset?')) return;
  const r = await fetch(`${API}/admin/clients/${selectedClient.id}/assets/${assetId}`, {method:'DELETE', headers:{'Authorization':'Bearer '+getToken()}});
  if (r.ok) { toast('Asset deleted','success'); loadAssetsTab(); }
  else toast('Delete failed','error');
}

function downloadAssetTemplate() {
  window.open(`${API}/upload/templates/assets`, '_blank');
}

function exportAssets() {
  window.open(`${API}/admin/clients/${selectedClient.id}/assets`, '_blank');
}

async function runMatching() {
  toast('Running CPE matching...', 'info', 0);
  try {
    const r = await fetch(`${API}/refresh`, {method:'POST', headers:{'Authorization':'Bearer '+getToken()}});
    document.querySelector('.toast')?.remove();
    toast('Matching triggered — check logs', 'success');
  } catch(e) { toast('Error: '+e.message, 'error'); }
}

// ── History tab ────────────────────────────────────────────────────────────────
async function loadHistoryTab() {
  const el = document.getElementById('cpane-history');
  if (!el) return;
  el.innerHTML = '<span class="spinner"></span>';
  try {
    const r = await fetch(`${API}/upload/history?client_id=${selectedClient.id}`, {headers:{Authorization:'Bearer '+getToken()}});
    const rows = r.ok ? await r.json() : [];
    el.innerHTML = `
      <div class="section-header">Import History</div>
      <table>
        <thead><tr><th>Filename</th><th>Format</th><th>Imported</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${rows.length ? rows.map(row=>`
          <tr>
            <td>${esc(row.filename||'')}</td>
            <td>${esc(row.file_type||'')}</td>

function toggleGithubForm(clientId) {
  const el = document.getElementById('github-push-form');
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

async function pushRulesToGitHub(clientId) {
  const repo   = document.getElementById('gh-repo')?.value.trim();
  const token  = document.getElementById('gh-token')?.value.trim();
  const branch = document.getElementById('gh-branch')?.value.trim() || 'main';
  const path   = document.getElementById('gh-path')?.value.trim() || 'detection-rules';
  const res    = document.getElementById('gh-result');
  if (!repo || !token) { toast('Repo and GitHub token are required', 'error'); return; }
  res.style.display = '';
  res.style.color   = 'var(--muted)';
  res.textContent   = 'Pushing rules...';
  try {
    const r = await fetch(`${API}/clients/${clientId}/export/push-rules-github`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken()},
      body: JSON.stringify({repo, token, branch, path}),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Push failed');
    const pushed = d.pushed || [];
    res.style.color = 'var(--green)';
    res.textContent = `Pushed ${pushed.length} rule file(s) to ${repo}/${branch}/${path}`;
    toast(`Detection rules pushed to GitHub (${pushed.length} files)`, 'success');
  } catch(e) {
    res.style.color = 'var(--red)';
    res.textContent = 'Error: ' + e.message;
    toast('Push failed: ' + e.message, 'error');
  }
}

async function sendDigest(clientId) {
  const btn = document.getElementById('digest-btn');
  const res = document.getElementById('digest-result');
  const days = document.getElementById('digest-days-admin')?.value || 7;
  btn.disabled = true; btn.textContent = 'SENDING...';
  res.style.display = ''; res.style.color = 'var(--muted)'; res.textContent = 'Sending email...';
  try {
    const r = await fetch(`${API}/admin/clients/${clientId}/send-digest?days=${days}`, {
      method: 'POST', headers: {'Authorization': 'Bearer ' + getToken()}
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Send failed');
    res.style.color = 'var(--green)';
    res.textContent = d.message || 'Digest sent';
    toast('Email digest sent', 'success');
  } catch(e) {
    res.style.color = 'var(--red)';
    res.textContent = 'Error: ' + e.message;
    toast('Digest failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '✉ SEND DIGEST';
  }
}

      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken()},

async function createWebhook() {
  const type = document.getElementById('wh-type')?.value;
  const url  = document.getElementById('wh-url')?.value.trim();
  const sec  = document.getElementById('wh-secret')?.value.trim();
  const sev  = document.getElementById('wh-severity')?.value;
  if (!url) { toast('URL is required', 'error'); return; }
  try {
    const r = await fetch(`${API}/admin/clients/${selectedClient.id}/webhooks`, {
      method: 'POST',
      headers: {Authorization: 'Bearer ' + getToken(), 'Content-Type': 'application/json'},
      body: JSON.stringify({webhook_type: type, url, secret: sec, min_severity: sev, categories: []}),
    });
    if (!r.ok) throw new Error((await r.json()).detail || 'Error');
    toast('Webhook created', 'success');
    loadWebhooksTab();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function testWebhook(whId) {
  try {
    const r = await fetch(`${API}/admin/clients/${selectedClient.id}/webhooks/${whId}/test`, {
      method: 'POST',
      headers: {Authorization: 'Bearer ' + getToken()},
    });
    const d = await r.json();
    if (r.ok && d.status !== 'error') {
      toast('Test payload sent — check your webhook receiver', 'success');

      toast('Test failed: ' + (d.status || JSON.stringify(d)), 'error');
    }
  } catch(e) { toast('Test error: ' + e.message, 'error'); }

async function deleteWebhook(whId) {
  if (!confirm('Delete this webhook?')) return;
  try {
    const r = await fetch(`${API}/admin/clients/${selectedClient.id}/webhooks/${whId}`, {
      method: 'DELETE',
      headers: {Authorization: 'Bearer ' + getToken()},
    });

    toast('Webhook deleted', 'success');
    loadWebhooksTab();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function toggleWebhook(whId, currentlyActive) {
  const newState = currentlyActive ? 0 : 1;
  try {
    const r = await fetch(`${API}/admin/clients/${selectedClient.id}/webhooks/${whId}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken()},
      body: JSON.stringify({is_active: newState}),
    });
    if (!r.ok) throw new Error('Update failed');
    toast(newState ? 'Webhook resumed' : 'Webhook paused', 'success');
    loadWebhooksTab();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function loadSystemOverview() {
  const panel = document.getElementById('main-panel');
  if (selectedClient) return;
  panel.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted)"><span class="spinner"></span><br>Loading system overview…</div>';

  const [ksiRes, scannersRes, siemsRes] = await Promise.allSettled([
    fetch(`${API}/ksi/summary`, {headers:{Authorization:'Bearer '+getToken()}}).then(r=>r.ok?r.json():null),
    fetch(`${API}/scanners/status`, {headers:{Authorization:'Bearer '+getToken()}}).then(r=>r.ok?r.json():null),
    fetch(`${API}/siems/status`, {headers:{Authorization:'Bearer '+getToken()}}).then(r=>r.ok?r.json():null),
  ]);
  if (selectedClient) return;

  const ksi = ksiRes.status==='fulfilled' ? ksiRes.value : null;
  const scanners = scannersRes.status==='fulfilled' ? scannersRes.value : null;
  const siems = siemsRes.status==='fulfilled' ? siemsRes.value : null;

  const ksiAgg = ksi?.aggregate || {};
  const passRate = ksiAgg.pass_rate != null ? (ksiAgg.pass_rate * 100).toFixed(0) + '%' : '—';
  const totalKsi = ksiAgg.total_ksi || 0;
  const totalPass = ksiAgg.total_passing || 0;

  const scList = scanners?.scanners || [];
  const scActive = scList.filter(s=>s.is_active).length;
  const scErr = scList.filter(s=>s.last_status && s.last_status.startsWith('error')).length;

  const siList = siems?.siems || [];
  const siActive = siList.filter(s=>s.is_active).length;

  panel.innerHTML = `
    <div class="section-header" style="margin-bottom:20px">System Overview</div>
    <div class="stat-row" style="margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-val">${clients.length}</div>
        <div class="stat-label">Active Clients</div>
      </div>
      <div class="stat-card" style="border-color:rgba(${totalKsi&&totalPass===totalKsi?'61,214,140':'240,89,90'},.2)">
        <div class="stat-val" style="color:${totalKsi&&totalPass===totalKsi?'var(--green)':'var(--amber)'}">${passRate}</div>
        <div class="stat-label">Cross-Client KSI Pass Rate</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:${scErr>0?'var(--red)':'var(--green)'}">${scActive}<span style="font-size:12px;color:var(--muted)">/${scList.length}</span></div>
        <div class="stat-label">Scanners Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${siActive}<span style="font-size:12px;color:var(--muted)">/${siList.length}</span></div>
        <div class="stat-label">SIEMs Active</div>
      </div>
    </div>

    ${ksi?.clients?.length ? `
    <div class="section-header">KSI — Per Client</div>
    <table style="margin-bottom:24px">
      <thead><tr><th>Client</th><th>Passing</th><th>Conditional</th><th>Failing</th><th>Status</th></tr></thead>
      <tbody>${ksi.clients.map(c=>{
        const col = c.authorization_status==='authorized'?'var(--green)':c.authorization_status==='conditional'?'var(--amber)':'var(--red)';
        return `<tr>
          <td style="font-weight:600">${esc(c.client_name||c.client_id)}</td>
          <td style="color:var(--green)">${c.passing||0}</td>
          <td style="color:var(--amber)">${c.conditional||0}</td>
          <td style="color:var(--red)">${c.failing||0}</td>
          <td><span style="font-size:8px;font-weight:700;color:${col}">${(c.authorization_status||'unknown').toUpperCase().replace(/-/g,' ')}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : ''}

    ${scList.length ? `
    <div class="section-header">Active Scanners</div>
    <table style="margin-bottom:24px">
      <thead><tr><th>Client</th><th>Scanner</th><th>Label</th><th>Status</th><th>Last Polled</th></tr></thead>
      <tbody>${scList.map(s=>{
        const ok = (s.last_status||'').startsWith('ok');
        return `<tr>
          <td style="font-size:8px;color:var(--muted)">${esc(s.client_id?.slice(0,8)||'—')}</td>
          <td><span style="font-size:8px;color:var(--teal);text-transform:uppercase">${esc(s.scanner_type)}</span></td>
          <td>${esc(s.label)}</td>
          <td style="font-size:8px;color:${ok?'var(--green)':s.last_status?'var(--amber)':'var(--muted)'}">${esc((s.last_status||'never').slice(0,40))}</td>
          <td style="font-size:8px;color:var(--muted)">${(s.last_polled||'Never').slice(0,16)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : ''}

    ${siList.length ? `
    <div class="section-header">Active SIEMs</div>
    <table>
      <thead><tr><th>Client</th><th>SIEM</th><th>Label</th><th>Status</th><th>Last Polled</th></tr></thead>
      <tbody>${siList.map(s=>{
        const ok = (s.last_status||'').startsWith('ok');
        return `<tr>
          <td style="font-size:8px;color:var(--muted)">${esc(s.client_id?.slice(0,8)||'—')}</td>
          <td><span style="font-size:8px;color:var(--purple);text-transform:uppercase">${esc(s.siem_type)}</span></td>
          <td>${esc(s.label)}</td>
          <td style="font-size:8px;color:${ok?'var(--green)':s.last_status?'var(--amber)':'var(--muted)'}">${esc((s.last_status||'never').slice(0,40))}</td>
          <td style="font-size:8px;color:var(--muted)">${(s.last_polled||'Never').slice(0,16)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : ''}

    ${!scList.length && !siList.length ? '<div class="empty" style="margin-top:20px">No scanners or SIEMs configured yet. Select a client to add integrations.</div>' : ''}
  `;
}

// ── Global Audit Log view ──────────────────────────────────────────────────────
let _gaOffset = 0;
const _gaLimit = 100;

function showGlobalAuditView() {
  selectedClient = null;
  renderClientList();
  const panel = document.getElementById('main-panel');
  panel.innerHTML = `
    <div class="section-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span>Global Audit Log</span>
      <div style="display:flex;gap:6px">
        <button class="btn sm" onclick="loadSystemOverview()">&#8592; System Overview</button>
        <a href="${API}/audit/export.csv?token=${getToken()}" download class="btn sm primary">&#8595; Export CSV</a>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
      <select id="ga-client" class="finput" style="width:180px;cursor:pointer">
        <option value="">All clients</option>
        ${clients.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
      </select>
      <input id="ga-etype" type="text" class="finput" placeholder="Event type filter…" style="width:160px">
      <input id="ga-user" type="text" class="finput" placeholder="Username filter…" style="width:140px">
      <button class="btn sm primary" onclick="_gaOffset=0;loadGlobalAudit()">Search</button>
      <button class="btn sm" onclick="document.getElementById('ga-client').value='';document.getElementById('ga-etype').value='';document.getElementById('ga-user').value='';_gaOffset=0;loadGlobalAudit()">Clear</button>
    </div>
    <div id="ga-table"><span class="spinner"></span></div>
    <div id="ga-pagination" style="display:flex;gap:8px;margin-top:12px;align-items:center"></div>
  `;
  _gaOffset = 0;
  loadGlobalAudit();
}

async function loadGlobalAudit() {
  const tableEl = document.getElementById('ga-table');
  const pagEl   = document.getElementById('ga-pagination');
  if (!tableEl) return;
  tableEl.innerHTML = '<span class="spinner"></span>';

  const clientId = document.getElementById('ga-client')?.value || '';
  const etype    = (document.getElementById('ga-etype')?.value || '').trim();
  const uname    = (document.getElementById('ga-user')?.value  || '').trim();

  const params = new URLSearchParams({ limit: _gaLimit, offset: _gaOffset });
  if (clientId) params.set('client_id', clientId);
  if (etype)    params.set('event_type', etype);
  if (uname)    params.set('username',   uname);

  try {
    const r = await fetch(`${API}/audit?${params}`, {headers:{Authorization:'Bearer '+getToken()}});
    if (!r.ok) { tableEl.innerHTML = '<div class="empty">Failed to load audit log</div>'; return; }
    const data = await r.json();
    const events = data.events || [];
    const total  = data.total  || 0;

    tableEl.innerHTML = `
      <div style="font-size:8px;color:var(--muted);margin-bottom:8px">${total} total event${total!==1?'s':''} · showing ${_gaOffset+1}–${Math.min(_gaOffset+_gaLimit,total)}</div>
      <table>
        <thead><tr><th>Time</th><th>Client</th><th>Event</th><th>User</th><th>Method</th><th>Path</th><th>Status</th><th>Duration</th></tr></thead>
        <tbody>${events.length ? events.map(e=>{
          const clientName = clients.find(c=>c.id===e.client_id)?.name || (e.client_id ? e.client_id.slice(0,8) : '—');
          return `<tr>
            <td style="font-size:9px;color:var(--muted);white-space:nowrap">${(e.timestamp||'').slice(0,19).replace('T',' ')}</td>
            <td style="font-size:8px;color:var(--muted)">${esc(clientName)}</td>
            <td style="font-size:9px">${esc(e.event_type||'—')}</td>
            <td style="font-size:9px;color:var(--muted)">${esc(e.username||'anon')}</td>
            <td><span style="font-size:8px;color:${e.method==='GET'?'var(--blue)':e.method==='POST'?'var(--green)':e.method==='DELETE'?'var(--red)':'var(--muted)'}">${esc(e.method||'—')}</span></td>
            <td style="font-size:9px;color:var(--muted);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.path||'')}">${esc((e.path||'').slice(0,60))}</td>
            <td><span style="font-size:9px;color:${(e.status_code||0)<400?'var(--green)':(e.status_code||0)<500?'var(--amber)':'var(--red)'}">${e.status_code||'—'}</span></td>
            <td style="font-size:9px;color:var(--muted)">${e.duration_ms!=null?e.duration_ms.toFixed(0)+'ms':'—'}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="8" class="empty">No events match your filters</td></tr>'}
        </tbody>
      </table>
    `;

    if (pagEl) {
      const hasPrev = _gaOffset > 0;
      const hasNext = _gaOffset + _gaLimit < total;
      pagEl.innerHTML = `
        ${hasPrev ? `<button class="btn sm" onclick="_gaOffset=Math.max(0,_gaOffset-${_gaLimit});loadGlobalAudit()">&#8592; Prev</button>` : ''}
        <span style="font-size:8px;color:var(--muted)">Page ${Math.floor(_gaOffset/_gaLimit)+1} / ${Math.max(1,Math.ceil(total/_gaLimit))}</span>
        ${hasNext ? `<button class="btn sm" onclick="_gaOffset=_gaOffset+${_gaLimit};loadGlobalAudit()">Next &#8594;</button>` : ''}
      `;
    }
  } catch(e) { tableEl.innerHTML = '<div class="empty">Error loading audit log</div>'; }
}

(async () => { await loadClients(); loadSystemOverview(); })();
</script>
<script src="/nav-component.js"></script>
</body>
