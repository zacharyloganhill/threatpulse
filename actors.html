<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PhantomFeed — Threat Actor Dossiers</title>
<style>
:root{--bg:#0d0f14;--bg2:#12151c;--bg3:#1a1e27;--bg4:#222736;--border:#2a2f3e;--text:#e2e8f0;--muted:#64748b;--teal:#00d4aa;--red:#ff4757;--amber:#ffa502;--blue:#00b4d8;--purple:#a29bfe;--green:#2ed573;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:48px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-brand{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--teal);font-weight:600;text-decoration:none}
.topbar-nav{display:flex;gap:2px;margin-left:auto}
.topbar-nav a{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:4px;transition:.15s}
.topbar-nav a:hover,.topbar-nav a.active{color:var(--teal);background:rgba(0,212,170,.08)}
.layout{display:flex;height:calc(100vh - 48px)}
.sidebar{width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-filters{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.sidebar-filters input,.sidebar-filters select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:6px 10px;font-size:11px;font-family:var(--mono)}
.sidebar-filters input::placeholder{color:var(--muted)}
.actor-list{flex:1;overflow-y:auto}
.actor-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.actor-item:hover{background:var(--bg3)}
.actor-item.active{background:rgba(0,212,170,.08);border-left:2px solid var(--teal)}
.actor-name{font-weight:600;font-size:12px;margin-bottom:3px}
.actor-meta{font-size:10px;color:var(--muted);display:flex;gap:8px}
.origin-flag{font-size:10px}
.motiv-badge{font-family:var(--mono);font-size:8px;padding:2px 5px;border-radius:3px}
.motiv-Espionage{background:rgba(0,180,216,.15);color:var(--blue)}
.motiv-Financial{background:rgba(46,213,115,.12);color:var(--green)}
.motiv-Sabotage{background:rgba(255,71,87,.15);color:var(--red)}
.motiv-Political,.motiv-Ideological{background:rgba(162,155,254,.15);color:var(--purple)}
.activity-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-Active{background:var(--green)}
.dot-Low{background:var(--amber)}
.dot-Defunct,.dot-Dormant{background:var(--muted)}
.dot-Unknown,.dot-Restructured{background:var(--blue)}
.main{flex:1;overflow-y:auto;padding:24px}
.dossier{max-width:900px}
.dossier-header{margin-bottom:20px}
.dossier-name{font-size:24px;font-weight:700;margin-bottom:4px}
.dossier-aliases{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:12px}
.dossier-meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.meta-pill{font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:4px;background:var(--bg4);border:1px solid var(--border)}
.meta-pill strong{color:var(--teal)}
.dossier-desc{font-size:13px;line-height:1.7;color:var(--text);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:20px}
.section-title{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;background:var(--bg4);border:1px solid var(--border);color:var(--muted)}
.tag.ttp{color:var(--amber);border-color:rgba(255,165,2,.3);background:rgba(255,165,2,.08)}
.tag.malware{color:var(--red);border-color:rgba(255,71,87,.3);background:rgba(255,71,87,.08)}
.tag.industry{color:var(--teal);border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.06)}
.ttp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:20px}
.ttp-cell{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-family:var(--mono);font-size:9px}
.ttp-id{color:var(--amber);font-weight:600;display:block;margin-bottom:2px}
.ttp-name{color:var(--muted);font-size:8px}
.item-row{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:6px;cursor:pointer;transition:.15s}
.item-row:hover{border-color:var(--teal)}
.item-title{font-size:12px;font-weight:500;margin-bottom:3px}
.item-meta{font-size:10px;color:var(--muted)}
.empty{text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:11px}
.btn{font-family:var(--mono);font-size:9px;padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:var(--bg4);color:var(--text);cursor:pointer;transition:.15s;text-decoration:none;display:inline-block}
.btn:hover{border-color:var(--teal);color:var(--teal)}
.activity-Active{color:var(--green)}
.activity-Low{color:var(--amber)}
.activity-Defunct,.activity-Dormant{color:var(--muted)}
.activity-Active::before,.activity-Low::before,.activity-Defunct::before{content:'* ';opacity:.7}
/* MITRE heatmap */
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px;margin-bottom:20px}
.tactic-cell{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:6px 8px;text-align:center}
.tactic-name{font-size:8px;color:var(--muted);font-family:var(--mono);letter-spacing:.5px;margin-bottom:3px}
.tactic-count{font-size:16px;font-weight:700;font-family:var(--mono)}
.tactic-count.has-techniques{color:var(--amber)}
</style>
</head>
<body data-page-title="THREAT ACTORS" data-back-url="/index.html">
<div class="topbar"></div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-filters">
      <input type="text" id="searchInput" placeholder="Search actors..." oninput="filterActors()">
      <select id="originFilter" onchange="filterActors()">
        <option value="">All Origins</option>
        <option>Russia</option>
        <option>China</option>
        <option>North Korea</option>
        <option>Iran</option>
        <option>USA</option>
        <option>Unknown</option>
      </select>
      <select id="motivFilter" onchange="filterActors()">
        <option value="">All Motivations</option>
        <option>Espionage</option>
        <option>Financial</option>
        <option>Sabotage</option>
        <option>Political / Ideological</option>
      </select>
      <label style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);cursor:pointer">
        <input type="checkbox" id="activeOnly" onchange="filterActors()"> Active only
      </label>
    </div>
    <div class="actor-list" id="actorList"></div>

    <!-- Client targeting analysis -->
    <div style="border-top:1px solid var(--border);padding:12px 14px;background:var(--bg2)">
      <div style="font-size:8px;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;text-transform:uppercase">Client Targeting</div>
      <select id="actor-client-sel" onchange="loadActorAlerts()" style="font-family:var(--mono);font-size:9px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 6px;width:100%;outline:none;margin-bottom:8px">
        <option value="">— Select client —</option>
      </select>
      <div id="actor-alerts-panel" style="font-size:9px;color:var(--muted)">Select a client to see which threat actors target their industry</div>
    </div>
  </div>

  <div class="main">
    <div id="dossierPanel">
      <div class="empty">Select a threat actor from the list to view their dossier</div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
const token = localStorage.getItem('pf_token') || '';

function hdr() {
  return token ? { Authorization: 'Bearer ' + token } : {};
}

async function api(path) {
  const r = await fetch(API + path, { headers: hdr() });
  if (!r.ok) return null;
  return r.json();
}

let allActors = [];
let selectedId = null;

// MITRE ATT&CK tactic mapping
const TACTICS = {
  'T1566': 'Phishing', 'T1190': 'Exploit Public-Facing App',
  'T1078': 'Valid Accounts', 'T1195': 'Supply Chain Compromise',
  'T1486': 'Data Encrypted for Impact', 'T1059': 'Command & Scripting',
  'T1021': 'Remote Services', 'T1505': 'Server Software Component',
  'T1027': 'Obfuscated Files', 'T1560': 'Archive Collected Data',
  'T1071': 'App Layer Protocol', 'T1133': 'External Remote Services',
  'T1055': 'Process Injection', 'T1562': 'Impair Defenses',
  'T1537': 'Transfer Data to Cloud', 'T1040': 'Network Sniffing',
  'T1534': 'Internal Spearphishing', 'T1539': 'Steal Web Session Cookie',
  'T1598': 'Phishing for Info', 'T1529': 'System Shutdown/Reboot',
};

function getTacticName(ttp) {
  const base = ttp.split('.')[0];
  return TACTICS[base] || ttp;
}

const ORIGIN_FLAGS = {
  'Russia': 'RU', 'China': 'CN', 'North Korea': 'KP', 'Iran': 'IR',
  'USA': 'US', 'US/UK': 'US', 'Vietnam': 'VN', 'Turkey': 'TR',
  'Pakistan': 'PK', 'Brazil/UK': 'BR',
};

async function loadActors() {
  const data = await api('/actors');
  if (!data) return;
  allActors = data.actors || [];
  renderActorList(allActors);
}

function filterActors() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const origin = document.getElementById('originFilter').value;
  const motiv = document.getElementById('motivFilter').value;
  const activeOnly = document.getElementById('activeOnly').checked;

  let filtered = allActors.filter(a => {
    if (search && !a.name.toLowerCase().includes(search) &&
        !(a.aliases || []).some(al => al.toLowerCase().includes(search))) return false;
    if (origin && a.origin !== origin) return false;
    if (motiv && a.motivation !== motiv) return false;
    if (activeOnly && a.recent_activity !== 'Active') return false;
    return true;
  });
  renderActorList(filtered);
}

function renderActorList(actors) {
  const el = document.getElementById('actorList');
  if (!actors.length) { el.innerHTML = '<div class="empty">No actors match filters</div>'; return; }
  el.innerHTML = actors.map(a => {
    const flag = ORIGIN_FLAGS[a.origin] || '--';
    const motivClass = 'motiv-' + (a.motivation || 'Unknown').split('/')[0].trim().replace(' ', '');
    const actClass = (a.recent_activity || 'Unknown').split(' ')[0];
    return `
    <div class="actor-item${a.id === selectedId ? ' active' : ''}" onclick="selectActor('${a.id}')">
      <div class="actor-name">
        <span class="activity-dot dot-${actClass}" style="display:inline-block;margin-right:6px"></span>
        ${a.name}
      </div>
      <div class="actor-meta">
        <span>${flag} ${a.origin || 'Unknown'}</span>
        <span class="motiv-badge ${motivClass}">${a.motivation || 'Unknown'}</span>
        <span class="activity-${actClass}" style="margin-left:auto;font-size:9px">${a.recent_activity || 'Unknown'}</span>
      </div>
    </div>`;
  }).join('');
}

async function selectActor(id) {
  selectedId = id;
  document.querySelectorAll('.actor-item').forEach(el => {
    el.classList.toggle('active', el.onclick.toString().includes(`'${id}'`));
  });

  const actor = allActors.find(a => a.id === id);
  if (!actor) return;

  // Load linked items
  const itemsData = await api(`/actors/${id}/items?limit=10`);
  const items = itemsData ? itemsData.items : [];

  renderDossier(actor, items);
}

function renderDossier(actor, items) {
  const ttps = actor.ttps || [];
  const malware = actor.known_malware || [];
  const industries = actor.target_industries || [];
  const aliases = actor.aliases || [];
  const actClass = (actor.recent_activity || 'Unknown').split(' ')[0];

  // Build ATT&CK mini heatmap
  const tacticCounts = {};
  ttps.forEach(t => {
    const name = getTacticName(t);
    tacticCounts[name] = (tacticCounts[name] || 0) + 1;
  });

  document.getElementById('dossierPanel').innerHTML = `
    <div class="dossier">
      <div class="dossier-header">
        <div style="display:flex;align-items:center;gap:12px">
          <h1 class="dossier-name">${actor.name}</h1>
          <span class="motiv-badge motiv-${(actor.motivation||'').split('/')[0].trim().replace(' ','')}">
            ${actor.motivation || 'Unknown'}
          </span>
          <span class="activity-${actClass}" style="font-family:var(--mono);font-size:10px">
            ● ${actor.recent_activity || 'Unknown'}
          </span>
        </div>
        ${aliases.length ? `<div class="dossier-aliases">Also known as: ${aliases.join(' · ')}</div>` : ''}
        <div class="dossier-meta-row">
          <div class="meta-pill"><strong>Origin</strong> ${actor.origin || 'Unknown'}</div>
          <div class="meta-pill"><strong>Sponsor</strong> ${actor.sponsor || 'Unknown'}</div>
          <div class="meta-pill"><strong>Active Since</strong> ${actor.active_since || 'Unknown'}</div>
          <div class="meta-pill"><strong>TTPs</strong> ${ttps.length}</div>
          <div class="meta-pill"><strong>Linked Items</strong> ${actor.item_count || items.length}</div>
        </div>
      </div>

      <div class="section-title">Description</div>
      <div class="dossier-desc">${actor.description || 'No description available.'}</div>

      <div class="section-title">Target Industries</div>
      <div class="tags-row">
        ${industries.map(i => `<span class="tag industry">${i}</span>`).join('')}
        ${!industries.length ? '<span style="color:var(--muted);font-size:11px">Not specified</span>' : ''}
      </div>

      <div class="section-title">Known Malware</div>
      <div class="tags-row">
        ${malware.map(m => `<span class="tag malware">${m}</span>`).join('')}
        ${!malware.length ? '<span style="color:var(--muted);font-size:11px">Not documented</span>' : ''}
      </div>

      <div class="section-title">ATT&CK Technique Coverage (${ttps.length} techniques)</div>
      ${ttps.length ? `
      <div class="heatmap">
        ${Object.entries(tacticCounts).map(([name, cnt]) => `
          <div class="tactic-cell">
            <div class="tactic-name">${name.slice(0, 18)}</div>
            <div class="tactic-count${cnt > 0 ? ' has-techniques' : ''}">${cnt}</div>
          </div>
        `).join('')}
      </div>
      <div class="tags-row">
        ${ttps.map(t => `<span class="tag ttp">${t}</span>`).join('')}
      </div>
      ` : '<div style="color:var(--muted);font-size:11px;margin-bottom:20px">No TTPs documented</div>'}

      <div class="section-title">Recent Linked Threat Items (${items.length})</div>
      ${items.length ? items.map(item => `
        <div class="item-row" onclick="window.open('dashboard.html?item=${item.id}','_blank')">
          <div class="item-title">${item.title}</div>
          <div class="item-meta">${item.feed_label} · ${item.severity} · ${item.published_at || ''}</div>
        </div>
      `).join('') : '<div class="empty" style="padding:20px">No linked items yet — actor scanning runs periodically</div>'}

      <div style="margin-top:20px;display:flex;gap:8px">
        <a class="btn" href="dashboard.html?search=${encodeURIComponent(actor.name)}" target="_blank">View in Feed</a>
      </div>
    </div>
  `;
}

// ── Client Targeting Analysis ─────────────────────────────────────────────────
let actorClients = [];
let selectedActorClient = '';

async function loadActorClients() {
  try {
    const r = await fetch(`${API}/admin/clients`, {headers: hdr()});
    if (!r.ok) return;
    const data = await r.json();
    actorClients = Array.isArray(data) ? data : (data.clients || []);
    const sel = document.getElementById('actor-client-sel');
    if (!sel) return;
    actorClients.forEach(c => {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      sel.appendChild(o);
    });
  } catch(e) {}
}

async function loadActorAlerts() {
  const clientId = document.getElementById('actor-client-sel')?.value;
  if (!clientId) return;
  selectedActorClient = clientId;
  const el = document.getElementById('actor-alerts-panel');
  el.innerHTML = '<div style="color:var(--muted);font-size:9px;padding:16px">Loading...</div>';
  try {
    const r = await fetch(`${API}/clients/${clientId}/actor-alerts`, {headers: hdr()});
    if (!r.ok) throw new Error();
    const d = await r.json();
    const actors = d.actors_targeting || [];
    const industry = d.client_industry || '—';

    if (!actors.length) {
      el.innerHTML = `<div style="color:var(--muted);font-size:9px;padding:12px 0">No tracked threat actors currently target this client's industry (${esc(industry)})</div>`;
      return;
    }

    el.innerHTML = `
      <div style="font-size:8px;color:var(--muted);margin-bottom:10px">${actors.length} actor(s) targeting <strong style="color:var(--text)">${esc(industry)}</strong> industry</div>
      ${actors.map(a => `
        <div style="padding:10px;border:1px solid var(--border);border-left:3px solid var(--red);margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:10px;font-weight:600;color:var(--text)">${esc(a.name)}</span>
            ${a.origin ? `<span style="font-size:8px;color:var(--muted)">${esc(a.origin)}</span>` : ''}
            ${a.is_active ? '<span style="font-size:7px;padding:1px 5px;border:1px solid rgba(240,89,90,.4);color:var(--red)">ACTIVE</span>' : ''}
          </div>
          ${a.motivation ? `<div style="font-size:8px;color:var(--muted)">Motivation: ${esc(a.motivation)}</div>` : ''}
          ${(a.target_industries||[]).length ? `<div style="font-size:8px;color:var(--muted);margin-top:3px">Targets: ${a.target_industries.join(', ')}</div>` : ''}
        </div>
      `).join('')}`;
  } catch(e) {
    el.innerHTML = '<div style="color:var(--muted);font-size:9px;padding:12px 0">Failed to load actor alerts</div>';
  }
}

loadActors();
loadActorClients();
</script>
<script src="/nav-component.js"></script>
</body>
</html>
