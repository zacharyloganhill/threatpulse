worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    # Never expose the nginx version in headers or error pages
    server_tokens off;

    # Rate-limit zone: 60 requests/min per IP (burst of 20 queued, rest dropped)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # Redirect all HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;   # replace _ with your domain, e.g. app.example.com

        # TLS — mount your certs into nginx/certs/ (see docker-compose.yml)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS config (TLS 1.2+ only, strong ciphers)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;
        ssl_session_tickets       off;

        # HSTS — 2 years, subdomains, preload-ready
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Upstream timeouts — allow long-running PDF/tabletop generation requests
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Health check — not rate-limited (used by Docker and load balancers)
        location = /health {
            proxy_pass http://app:8000/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # All other requests — rate-limited, proxied to FastAPI
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://app:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for the Ollama streaming proxy
            proxy_buffering    off;
            proxy_cache        off;
        }
    }
}
